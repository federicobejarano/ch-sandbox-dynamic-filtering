<ion-header>
    <ion-toolbar>
        <ion-title>Registrate!</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-input
        formControlName="name"
        label="Nombre"
        labelPlacement="floating"
        fill="outline"
        type="text"
        placeholder="Ingresá tu nombre"
        [errorText]="getErrorText(nameCtrl, { required: 'El nombre es obligatorio', minlength: 'Mínimo 2 caracteres', serverError: nameCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="nameCtrl.invalid"
        [class.ion-touched]="nameCtrl.touched"
      />
    </ion-item>

    <ion-item>
      <ion-input
        formControlName="email"
        label="Email"
        labelPlacement="floating"
        fill="outline"
        type="email"
        placeholder="tucorreo@ejemplo.com"
        [errorText]="getErrorText(emailCtrl, { required: 'El email es obligatorio', email: 'Ingresá un email válido', serverError: emailCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="emailCtrl.invalid"
        [class.ion-touched]="emailCtrl.touched"
      />
    </ion-item>

    <ion-item>
      <ion-select
        formControlName="lineageType"
        label="Tipo de linaje"
        labelPlacement="floating"
        fill="outline"
        interface="popover"
        placeholder="Seleccioná una opción"
        [errorText]="getErrorText(lineageTypeCtrl, { required: 'Seleccioná un tipo de linaje', serverError: lineageTypeCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="lineageTypeCtrl.invalid"
        [class.ion-touched]="lineageTypeCtrl.touched"
      >
        @for (option of lineageOptions; track option.value) {
          <ion-select-option [value]="option.value">
            {{ option.label }}
          </ion-select-option>
        }
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-input
        formControlName="location"
        label="Ubicación"
        labelPlacement="floating"
        fill="outline"
        type="text"
        placeholder="Ingresá tu ciudad o localidad"
        [errorText]="getErrorText(locationCtrl, { required: 'La ubicación es obligatoria', serverError: locationCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="locationCtrl.invalid"
        [class.ion-touched]="locationCtrl.touched"
      />
    </ion-item>

    <ion-item>
      <ion-input
        formControlName="birthDate"
        label="Fecha de nacimiento"
        labelPlacement="floating"
        fill="outline"
        type="date"
        [max]="todayDate"
        [errorText]="getErrorText(birthDateCtrl, { required: 'La fecha de nacimiento es obligatoria', serverError: birthDateCtrl.getError('serverError') ?? '' })"
        [class.ion-invalid]="birthDateCtrl.invalid"
        [class.ion-touched]="birthDateCtrl.touched"
      />
    </ion-item>

    <ion-button
      type="submit"
      expand="block"
      [disabled]="registrationForm.invalid"
    >
      Registrar
    </ion-button>
  </form>

  <div class="navigation-section">
    <ion-button
      routerLink="/users"
      expand="block"
      fill="outline"
      color="medium"
    >
      Ver Usuarios Registrados
    </ion-button>

    <ion-button
      routerLink="/search"
      expand="block"
      fill="outline"
      color="primary"
    >
      Ir a Búsqueda Avanzada
    </ion-button>
  </div>

</ion-content>
